<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AYAZFX Downloader - Pro Version</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00f2fe;
            --secondary: #4facfe;
            --bg: #0b1121;
            --text: #ffffff;
            --card-bg: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg);
            background-image: 
                radial-gradient(at 10% 20%, rgba(79, 172, 254, 0.15) 0px, transparent 50%),
                radial-gradient(at 90% 80%, rgba(0, 242, 254, 0.1) 0px, transparent 50%);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
        }

        .container {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            padding: 3rem 2rem;
            border-radius: 24px;
            border: 1px solid var(--border);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            width: 90%;
            max-width: 550px;
            text-align: center;
            position: relative;
            animation: fadeIn 0.8s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-weight: 700;
            margin-bottom: 5px;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 2.2rem;
        }

        .subtitle {
            font-weight: 300;
            font-size: 0.9rem;
            color: #94a3b8;
            margin-bottom: 30px;
            letter-spacing: 1px;
        }

        .input-group {
            position: relative;
            margin-bottom: 20px;
        }

        .input-group i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255,255,255,0.5);
            font-size: 1.2rem;
        }

        input {
            width: 100%;
            padding: 15px 15px 15px 50px;
            border: 2px solid var(--border);
            border-radius: 12px;
            background: rgba(0,0,0,0.2);
            color: white;
            font-size: 1rem;
            box-sizing: border-box;
            transition: 0.3s;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.3);
        }

        .platform-icons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 25px;
            font-size: 1.5rem;
            color: rgba(255,255,255,0.3);
        }

        .platform-icons i.active {
            color: var(--primary);
            text-shadow: 0 0 10px var(--primary);
        }

        button.main-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(to right, var(--secondary), var(--primary));
            border: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            color: #0b1121;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        button.main-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(0, 242, 254, 0.5);
        }

        button.main-btn:active {
            transform: translateY(1px);
        }

        /* Modern Loader */
        .loader-container {
            display: none;
            margin: 20px auto;
        }

        .loader {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(255,255,255,0.1);
            border-radius: 50%;
            border-top-color: var(--primary);
            animation: spin 1s ease-in-out infinite;
            margin: auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Result Card */
        #result {
            margin-top: 25px;
            display: none;
            padding: 20px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            animation: slideUp 0.5s ease;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .success-icon {
            font-size: 2.5rem;
            color: #4caf50;
            margin-bottom: 10px;
        }

        .download-btn {
            background: white !important;
            color: black !important;
            text-decoration: none;
            margin-top: 15px;
        }

        .footer {
            margin-top: 40px;
            font-size: 0.8rem;
            color: rgba(255,255,255,0.3);
        }
    </style>
</head>
<body>

<div class="container">
    <h1>AYAZFX</h1>
    <div class="subtitle">MULTI-PLATFORM DOWNLOADER</div>

    <div class="platform-icons">
        <i class="fab fa-youtube" id="icon-yt"></i>
        <i class="fab fa-instagram" id="icon-insta"></i>
        <i class="fab fa-pinterest" id="icon-pin"></i>
    </div>
    
    <div class="input-group">
        <i class="fas fa-link"></i>
        <input type="text" id="videoUrl" placeholder="Paste link from YT, Insta, Pinterest..." autocomplete="off">
    </div>

    <button onclick="fetchVideo()" class="main-btn" id="btnAction">
        <span id="btnText">DOWNLOAD</span>
        <i class="fas fa-arrow-right"></i>
    </button>
    
    <div class="loader-container" id="loader">
        <div class="loader"></div>
        <p style="color:var(--primary); font-size:0.8rem; margin-top:10px;">Fetching video details...</p>
    </div>

    <div id="result">
        <i class="fas fa-check-circle success-icon"></i>
        <p style="margin: 0; font-weight:600;">Your video is ready!</p>
        <p style="font-size:0.8rem; color:#94a3b8; margin-bottom:15px;">Click below to save it.</p>
        <a id="downloadLink" href="#" target="_blank" class="main-btn download-btn">
            <i class="fas fa-download"></i> SAVE TO GALLERY
        </a>
    </div>

    <div class="footer">Developed by Ayaz | Pro Version v1.0</div>
</div>

        const url = e.target.value;

        const insta = document.getElementById('icon-insta');
