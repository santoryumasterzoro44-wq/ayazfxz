<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AYAZFX - Multi Downloader</title>
    <style>
        :root { --primary: #00ff88; --bg: #0f172a; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: #1e293b; padding: 2rem; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 90%; max-width: 500px; text-align: center; }
        h1 { color: var(--primary); margin-bottom: 5px; }
        p { font-size: 0.9rem; color: #94a3b8; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; border: 2px solid #334155; border-radius: 8px; background: #0f172a; color: white; margin-bottom: 15px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: var(--primary); border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; color: #0f172a; }
        button:hover { opacity: 0.8; transform: scale(1.02); }
        #result { margin-top: 20px; display: none; padding: 15px; border-radius: 8px; background: #334155; }
        .loader { display: none; border: 4px solid #f3f3f3; border-top: 4px solid var(--primary); border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 10px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .footer { margin-top: 20px; font-size: 0.7rem; color: #64748b; }
    </style>
</head>
<body>

<div class="container">
    <h1>AYAZFX Downloader</h1>
    <p>YT, Insta, Pinterest - No Ads</p>
    
    <input type="text" id="videoUrl" placeholder="Paste link here..." autocomplete="off">
    <button onclick="fetchVideo()" id="btnText">Download Now</button>
    
    <div class="loader" id="loader"></div>

    <div id="result">
        <p style="color:white">Video Ready!</p>
        <a id="downloadLink" href="#" target="_blank">
            <button style="background: #ffffff; color: #000;">Save to Gallery</button>
        </a>
    </div>

    <div class="footer">Created for Ayaz's Project</div>
</div>

<script>
async function fetchVideo() {
    const url = document.getElementById('videoUrl').value;
    const btn = document.getElementById('btnText');
    const loader = document.getElementById('loader');
    const resultDiv = document.getElementById('result');
    const dlLink = document.getElementById('downloadLink');

    if(!url) return alert("Link to daal bhai!");

    // UI Updates
    btn.style.display = 'none';
    loader.style.display = 'block';
    resultDiv.style.display = 'none';

    try {
        // Using a public rapid-api or open fetcher (Example logic)
        // Note: For real world, you'll need an API key from RapidAPI (e.g., All-in-one downloader)
        const apiUrl = `https://api.boxentriq.com/social/download?url=${encodeURIComponent(url)}`;
        
        const response = await fetch(apiUrl);
        const data = await response.json();

        if(data && data.url) {
            dlLink.href = data.url;
            resultDiv.style.display = 'block';
        } else {
            alert("Video nahi mili, link check kar!");
        }
    } catch (error) {
        alert("Server Error! Try again later.");
    } finally {
        btn.style.display = 'block';
        loader.style.display = 'none';
    }
}
</script>

</body>
</html>
